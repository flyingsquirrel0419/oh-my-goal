<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">oh-my-goal OpenCode TUI preview</title>
  <desc id="desc">A crisp OpenCode-style terminal preview showing a user entering slash goal command and the goal loop continuing until achieved.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#0d1b16"/>
    </linearGradient>
    <linearGradient id="panel" x1="110" y1="82" x2="1490" y2="818" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e1628"/>
      <stop offset="1" stop-color="#09131f"/>
    </linearGradient>
    <filter id="lift" x="72" y="50" width="1456" height="808" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .sans {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .label {
        font-size: 24px;
        fill: #94a3b8;
      }
      .body {
        font-size: 31px;
        fill: #dbeafe;
      }
      .small {
        font-size: 24px;
        fill: #93a4bd;
      }
      .dim {
        fill: #64748b;
      }
      .cyan {
        fill: #67e8f9;
      }
      .green {
        fill: #86efac;
      }
      .amber {
        fill: #facc15;
      }
      .line-1 {
        opacity: 0;
        animation: show 0.18s linear 0.2s forwards;
      }
      .line-2 {
        opacity: 0;
        animation: show 0.18s linear 1.1s forwards;
      }
      .line-3 {
        opacity: 0;
        animation: show 0.18s linear 2s forwards;
      }
      .line-4 {
        opacity: 0;
        animation: show 0.18s linear 2.9s forwards;
      }
      .line-5 {
        opacity: 0;
        animation: show 0.18s linear 3.8s forwards;
      }
      .line-6 {
        opacity: 0;
        animation: show 0.18s linear 4.7s forwards;
      }
      .cursor {
        animation: blink 1s steps(2, start) infinite;
      }
      @keyframes show {
        to {
          opacity: 1;
        }
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </defs>

  <rect width="1600" height="900" rx="42" fill="url(#page)"/>

  <g filter="url(#lift)">
    <rect x="110" y="82" width="1380" height="736" rx="28" fill="url(#panel)" stroke="#203047" stroke-width="2"/>

    <rect x="110" y="82" width="1380" height="78" rx="28" fill="#0f172a"/>
    <path d="M110 160H1490" stroke="#203047" stroke-width="2"/>
    <text x="154" y="132" class="sans" font-size="27" font-weight="700" fill="#e2e8f0">opencode</text>
    <text x="303" y="132" class="mono label">oh-my-goal</text>
    <text x="1134" y="132" class="mono label">build</text>
    <text x="1230" y="132" class="mono label">gpt-5.5</text>
    <text x="1384" y="132" class="mono label">main</text>

    <rect x="154" y="198" width="286" height="52" rx="12" fill="#111c31" stroke="#263850"/>
    <text x="178" y="233" class="mono small">session: oh-my-goal</text>

    <rect x="462" y="198" width="982" height="52" rx="12" fill="#07111f" stroke="#1e293b"/>
    <text x="488" y="233" class="mono small"><tspan class="cyan">goal</tspan> pursuing · iteration 3 · 12.4k / 50k tokens</text>

    <g class="mono">
      <text x="154" y="314" class="label">user</text>
      <rect x="252" y="276" width="788" height="60" rx="14" fill="#101b2d" stroke="#22344f"/>
      <text x="281" y="316" class="body"><tspan class="cyan">/goal</tspan> fix flaky login redirect test</text>

      <g class="line-1">
        <text x="154" y="405" class="label">assistant</text>
        <text x="314" y="405" class="body"><tspan class="green">✓</tspan> Goal started and stored in <tspan class="cyan">.opencode/goal.json</tspan></text>
      </g>

      <g class="line-2">
        <text x="154" y="475" class="label">idle</text>
        <text x="314" y="475" class="body"><tspan class="amber">→</tspan> injecting Active Goal Check</text>
      </g>

      <g class="line-3">
        <text x="154" y="545" class="label">agent</text>
        <text x="314" y="545" class="body">reproducing redirect failure and tracing auth state</text>
      </g>

      <g class="line-4">
        <text x="154" y="615" class="label">agent</text>
        <text x="314" y="615" class="body">patching regression test and running focused checks</text>
      </g>

      <g class="line-5">
        <text x="154" y="685" class="label">assistant</text>
        <text x="314" y="685" class="body"><tspan class="green">GOAL_ACHIEVED:</tspan> redirect test is stable</text>
      </g>

      <g class="line-6">
        <rect x="154" y="735" width="1290" height="58" rx="16" fill="#07111f" stroke="#1e293b"/>
        <text x="184" y="773" class="small"><tspan class="dim">›</tspan> goal loop stopped · summary prompt queued</text>
        <rect x="1398" y="748" width="18" height="28" rx="2" fill="#cbd5e1" class="cursor"/>
      </g>
    </g>
  </g>
</svg>
