<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">oh-my-goal terminal preview</title>
  <desc id="desc">A clean terminal preview showing OpenCode launched with opencode and a goal started with /goal.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15171c"/>
      <stop offset="1" stop-color="#090a0d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20242b"/>
      <stop offset="1" stop-color="#101318"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ced1"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #8b949e; }
      .text { fill: #e6edf3; }
      .dim { fill: #aeb7c2; }
      .cyan { fill: #00ced1; }
      .green { fill: #7ee787; }
      .orange { fill: #ffb86c; }
    </style>
  </defs>

  <rect width="960" height="540" rx="22" fill="#0b0d11"/>
  <rect x="28" y="26" width="904" height="488" rx="16" fill="url(#shell)" filter="url(#shadow)"/>

  <g class="sans">
    <rect x="28" y="26" width="904" height="44" rx="16" fill="#191d24"/>
    <path d="M28 54h904v16H28z" fill="#191d24"/>
    <circle cx="54" cy="48" r="6" fill="#ff5f57"/>
    <circle cx="76" cy="48" r="6" fill="#ffbd2e"/>
    <circle cx="98" cy="48" r="6" fill="#28c840"/>
    <text x="480" y="53" text-anchor="middle" font-size="13" fill="#98a2b3">~/work/oh-my-goal</text>
  </g>

  <g class="mono" font-size="18">
    <text x="56" y="111" class="muted">$</text>
    <text x="80" y="111" class="text">opencode</text>
    <rect x="169" y="95" width="10" height="22" fill="#e6edf3">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.25s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(56 145)">
    <rect width="848" height="318" rx="12" fill="url(#panel)" stroke="#303844"/>

    <g class="sans">
      <text x="24" y="37" font-size="14" font-weight="700" fill="#f8fafc">OpenCode</text>
      <text x="118" y="37" font-size="13" class="muted">Sisyphus - Ultraworker</text>
      <text x="306" y="37" font-size="13" class="muted">/</text>
      <text x="324" y="37" font-size="13" fill="#d6e4ff">GLM-5.1</text>
      <text x="750" y="37" font-size="13" class="muted">idle</text>
      <circle cx="808" cy="32" r="5" fill="#7ee787"/>
    </g>

    <line x1="24" y1="58" x2="824" y2="58" stroke="#2d3440"/>

    <g transform="translate(24 82)" class="mono">
      <rect width="800" height="78" rx="8" fill="#0d1117" stroke="#2b313b"/>
      <rect x="0" y="0" width="4" height="78" rx="2" fill="url(#accent)"/>
      <text x="24" y="32" font-size="17" class="cyan">/goal</text>
      <text x="83" y="32" font-size="17" class="text">create TODO.md with one checkbox</text>
      <text x="24" y="59" font-size="13" class="muted">Start or control an autonomous goal for this OpenCode session</text>
    </g>

    <g transform="translate(24 184)" class="mono" font-size="14">
      <text x="0" y="0" class="green">GOAL_CREATED</text>
      <text x="112" y="0" class="dim">objective saved to</text>
      <text x="272" y="0" class="orange">.opencode/goal.json</text>

      <text x="0" y="34" class="cyan">session.idle</text>
      <text x="112" y="34" class="dim">continues the next concrete step automatically</text>

      <text x="0" y="68" class="muted">status</text>
      <text x="112" y="68" class="text">active</text>
      <text x="210" y="68" class="muted">iteration</text>
      <text x="306" y="68" class="text">1</text>
      <text x="362" y="68" class="muted">budget</text>
      <text x="440" y="68" class="text">none</text>
    </g>

    <g transform="translate(610 193)" class="sans">
      <rect width="214" height="84" rx="8" fill="#111820" stroke="#26313d"/>
      <text x="16" y="27" font-size="12" class="muted">Next action</text>
      <text x="16" y="52" font-size="15" fill="#f8fafc">Edit TODO.md</text>
      <text x="16" y="72" font-size="12" class="muted">then verify and report</text>
    </g>
  </g>

  <g class="sans">
    <text x="56" y="498" font-size="13" class="muted">oh-my-goal keeps one objective moving until it is done, blocked, paused, or out of budget.</text>
  </g>
</svg>
